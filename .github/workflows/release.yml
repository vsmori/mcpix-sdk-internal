# Release: build cross-platform, empacotamento, SHA256SUMS, publicação.
# Dispara em push de tag `v*` ou via workflow_dispatch.
#
# Matriz:
#   - ubuntu-latest: Linux .so, Windows .dll (cross via mingw), Android (4 ABIs via cargo-ndk)
#   - macos-latest: iOS XCFramework (device + simulator universal)
#
# Os jobs depositam artefatos em dist/, baixados pelo job `publish` que
# computa SHA256SUMS, produz GitHub Release e (opcionalmente) publica em
# Maven e NuGet quando os secrets correspondentes estiverem disponíveis.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (default: tag without leading v)'
        required: false
      dry_run:
        description: 'Skip GitHub Release creation, registry publish, and SLSA asset upload'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  id-token: write   # SLSA L3 — OIDC para keyless signing via Sigstore.
  actions: read     # SLSA L3 — leitura de metadados de workflow.

env:
  CARGO_TERM_COLOR: always
  # Força as actions JS (checkout, setup-*, upload-artifact…) a rodar no
  # Node 24. Node 20 está deprecado nos runners GHA (forçado a partir de
  # jun/2026, removido em set/2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Gate de modo: classifica este run em UM dos três modos e exporta
  # flags para os jobs downstream. A intenção é tornar o comportamento
  # do release.yml explícito ANTES de qualquer artefato ser produzido —
  # sem isso, um dispatch ou tag de pré-release acidentalmente
  # publicaria como se fosse final.
  #
  # Modos:
  #   • dry-run     — workflow_dispatch com inputs.dry_run=true. Builda,
  #                   empacota, assina, gera SHA256SUMS — mas NÃO cria
  #                   GitHub Release, NÃO publica em Maven/NuGet, NÃO
  #                   sobe assets pro SLSA provenance.
  #   • pre-release — tag `v*` que casa com `-rc.N|-beta.N|-alpha.N` ou
  #                   workflow_dispatch sem dry_run. Cria GitHub Release
  #                   marcado como pre-release; NÃO publica nos registries
  #                   (semver-clean: pre-release não polui canal estável).
  #   • final       — tag `v*` sem sufixo de pré-release. Caminho completo:
  #                   GitHub Release + publish Maven/NuGet + SLSA assets.
  #
  # Sign-required: signing tem que existir em pre-release E final. Em
  # dry-run, signing é opcional (útil para testar o pipeline sem ter o
  # secret configurado). Falhar cedo se o secret estiver ausente quando
  # exigido evita o cenário "release silenciosamente sem .sig".
  mode-gate:
    name: classify run mode
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.classify.outputs.mode }}
      sign_required: ${{ steps.classify.outputs.sign_required }}
      publish_registries: ${{ steps.classify.outputs.publish_registries }}
      create_github_release: ${{ steps.classify.outputs.create_github_release }}
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
    steps:
      - id: classify
        shell: bash
        env:
          REF: ${{ github.ref }}
          EVENT: ${{ github.event_name }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          mode=""
          create_github_release=false
          publish_registries=false
          is_prerelease=false

          if [[ "$EVENT" == "workflow_dispatch" && "$DRY_RUN" == "true" ]]; then
            mode=dry-run
          elif [[ "$REF" == refs/tags/v* ]]; then
            # Considera pré-release: -rc.N, -beta.N, -alpha.N (case insensitive).
            if [[ "$REF" =~ -(rc|alpha|beta)(\.[0-9]+)?$ ]]; then
              mode=pre-release
              create_github_release=true
              is_prerelease=true
            else
              mode=final
              create_github_release=true
              publish_registries=true
            fi
          else
            # workflow_dispatch sem dry_run e sem estar em tag → trata como
            # pre-release "de teste em branch" — cria release marcada como
            # prerelease, sem publicar nos registries.
            mode=pre-release
            create_github_release=true
            is_prerelease=true
          fi

          # Signing é obrigatório quando algo será publicado/distribuído.
          if [[ "$mode" == "dry-run" ]]; then
            sign_required=false
          else
            sign_required=true
          fi

          echo "mode=$mode"                                 >> "$GITHUB_OUTPUT"
          echo "sign_required=$sign_required"               >> "$GITHUB_OUTPUT"
          echo "publish_registries=$publish_registries"     >> "$GITHUB_OUTPUT"
          echo "create_github_release=$create_github_release" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease"               >> "$GITHUB_OUTPUT"

          {
            echo "### release.yml mode: \`$mode\`"
            echo ""
            echo "| flag | value |"
            echo "| --- | --- |"
            echo "| sign_required | \`$sign_required\` |"
            echo "| create_github_release | \`$create_github_release\` |"
            echo "| is_prerelease | \`$is_prerelease\` |"
            echo "| publish_registries | \`$publish_registries\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      # Fail-fast: se signing é obrigatório mas o secret está ausente,
      # interrompe ANTES de produzir qualquer artefato. Evita o cenário
      # "release publicado sem .sig" que o `if: env != ''` antigo permitia.
      - name: ensure signing secret is set when required
        if: steps.classify.outputs.sign_required == 'true'
        env:
          MCPIX_SIGN_PRIVKEY_HEX: ${{ secrets.MCPIX_SIGN_PRIVKEY_HEX }}
        run: |
          if [[ -z "${MCPIX_SIGN_PRIVKEY_HEX:-}" ]]; then
            echo "::error::mode=${{ steps.classify.outputs.mode }} requires signing but MCPIX_SIGN_PRIVKEY_HEX is not set."
            echo "::error::Either configure the secret, or re-dispatch with dry_run=true."
            exit 1
          fi

  # Gate pré-build: prova que o release atual ainda compila de forma
  # hermética (sem rede após `cargo vendor`). Roda após mode-gate porque
  # se o run não pode publicar (secret ausente), não vale gastar ~10min
  # buildando. Phase 1 do SLSA L4 (cross-runner comparison vive em
  # reproducibility.yml; ver docs/SLSA_L4_PROGRESS.md).
  hermetic-gate:
    name: hermetic build gate (SLSA L4 phase 1)
    needs: mode-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: cargo xtask verify-hermetic
        run: cargo xtask verify-hermetic
        # ~10 min de wall time (vendor + build offline). Inflar o
        # release.yml em 10min é aceitável porque tags v* são
        # esporádicas — vale o sinal "este build é reconstruível".

  linux-windows:
    name: linux + windows (cross via mingw)
    needs: hermetic-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu

      - name: install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - uses: Swatinem/rust-cache@v2

      - name: build linux
        run: cargo xtask build-linux

      - name: build windows
        run: cargo xtask build-windows

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-windows
          path: dist/

  android:
    name: android (4 ABIs)
    needs: hermetic-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d

      - name: install cargo-ndk
        run: cargo install cargo-ndk --locked

      - uses: Swatinem/rust-cache@v2

      - name: build android
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo xtask build-android

      - uses: actions/upload-artifact@v4
        with:
          name: dist-android
          path: dist/

  ios:
    name: ios (XCFramework)
    needs: hermetic-gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2

      - name: build ios + xcframework
        run: |
          cargo xtask build-ios
          cargo xtask package-xcframework

      - uses: actions/upload-artifact@v4
        with:
          name: dist-ios
          path: dist/

  package:
    name: package + sign + release
    needs: [mode-gate, linux-windows, android, ios]
    runs-on: ubuntu-latest
    # Exporta o digest dos artefatos para o job `provenance` (SLSA L3).
    # Saída em base64 (formato esperado pelo slsa-github-generator).
    outputs:
      artifacts-base64-subjects: ${{ steps.subjects.outputs.subjects }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: dist-staged }

      - name: merge artifacts
        run: |
          mkdir -p dist
          cp -r dist-staged/dist-linux-windows/* dist/ 2>/dev/null || true
          cp -r dist-staged/dist-android/* dist/ 2>/dev/null || true
          cp -r dist-staged/dist-ios/* dist/ 2>/dev/null || true
          ls -la dist/

      - uses: dtolnay/rust-toolchain@stable

      - name: hash artifacts
        run: cargo xtask hash-artifacts

      - name: sign SHA256SUMS
        # Em dry-run signing é opcional (corre se o secret estiver setado,
        # silencia se não). Em pre-release/final o mode-gate já provou
        # que MCPIX_SIGN_PRIVKEY_HEX existe, então signing é obrigatório.
        if: needs.mode-gate.outputs.sign_required == 'true' || env.MCPIX_SIGN_PRIVKEY_HEX != ''
        env:
          MCPIX_SIGN_PRIVKEY_HEX: ${{ secrets.MCPIX_SIGN_PRIVKEY_HEX }}
        run: cargo xtask sign-artifacts

      # ── AAR ─────────────────────────────────────────────────────────────
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: 17 }
      - uses: android-actions/setup-android@v3
        with: { cmdline-tools-version: 11076708 }
      - uses: gradle/actions/setup-gradle@v3
      - name: package aar
        run: cargo xtask package-aar

      # ── NuGet ───────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: package nuget
        run: cargo xtask package-nuget

      - name: hash final artifacts
        run: cargo xtask hash-artifacts

      - name: re-sign final SHA256SUMS
        # Em dry-run signing é opcional (corre se o secret estiver setado,
        # silencia se não). Em pre-release/final o mode-gate já provou
        # que MCPIX_SIGN_PRIVKEY_HEX existe, então signing é obrigatório.
        if: needs.mode-gate.outputs.sign_required == 'true' || env.MCPIX_SIGN_PRIVKEY_HEX != ''
        env:
          MCPIX_SIGN_PRIVKEY_HEX: ${{ secrets.MCPIX_SIGN_PRIVKEY_HEX }}
        run: cargo xtask sign-artifacts

      # ── SLSA L3: extrai (path, sha256) de cada artefato e codifica em      ─
      # base64. Esse formato é o "subjects" da spec in-toto; o reusable        ─
      # workflow `generator_generic_slsa3.yml` o consome literalmente e        ─
      # assina via Sigstore (Fulcio cert + Rekor inclusion proof) usando o     ─
      # OIDC token efêmero do runner — não há chave privada longa.             ─
      - name: prepare SLSA subjects
        id: subjects
        run: |
          # Lista de artefatos a serem attestados. Mantemos SHA256SUMS de
          # fora porque ele já enumera os hashes em si; provar provenance
          # de cada binário individualmente é o que o consumidor verifica.
          (
            cd dist
            find . -type f \
              \( -name "*.so" -o -name "*.dll" -o -name "*.aar" \
                 -o -name "*.nupkg" -o -path "*MCPixSDKFFI.xcframework*" \) \
              -print0 | xargs -0 sha256sum
          ) > /tmp/subjects.txt
          # base64 sem quebras de linha (formato esperado pelo generator).
          echo "subjects=$(base64 -w0 < /tmp/subjects.txt)" >> "$GITHUB_OUTPUT"

      # ── GitHub Release ──────────────────────────────────────────────────
      # Em dry-run o release não é criado — todos os artefatos seguem
      # disponíveis como GHA build artifacts via upload-artifact abaixo.
      - name: github release
        if: needs.mode-gate.outputs.create_github_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.mode-gate.outputs.is_prerelease == 'true' }}
          files: |
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/**/*.so
            dist/**/*.dll
            dist/**/*.aar
            dist/**/*.nupkg
            dist/ios/MCPixSDKFFI.xcframework/**

      # Em dry-run e pre-release, publica o dist/ completo como artefato
      # do GHA run — assim o operador consegue inspecionar localmente
      # ANTES de promover ao final.
      - name: upload dist/ as artifact (dry-run + pre-release inspection)
        if: needs.mode-gate.outputs.mode != 'final'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.mode-gate.outputs.mode }}-${{ github.sha }}
          path: dist/
          retention-days: 14

      # ── Publicação em registries ────────────────────────────────────────
      # Só em tag final. Pré-release NÃO publica em Maven/NuGet — o canal
      # estável fica reservado para releases com SemVer "limpo", evitando
      # que consumidores com `implementation('br.com.mcpix:mcpix-sdk:+')`
      # peguem `0.1.0-rc.1` por acidente.
      - name: publish to Maven registry
        if: needs.mode-gate.outputs.publish_registries == 'true' && env.MAVEN_URL != ''
        env:
          MAVEN_URL: ${{ secrets.MAVEN_URL }}
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASS: ${{ secrets.MAVEN_PASS }}
        working-directory: bindings/kotlin/aar
        run: gradle publish -Pmaven.url="$MAVEN_URL" -Pmaven.user="$MAVEN_USER" -Pmaven.pass="$MAVEN_PASS"

      - name: publish to NuGet feed
        if: needs.mode-gate.outputs.publish_registries == 'true' && env.NUGET_URL != ''
        env:
          NUGET_URL: ${{ secrets.NUGET_URL }}
          NUGET_KEY: ${{ secrets.NUGET_KEY }}
        run: |
          dotnet nuget push 'dist/nuget/*.nupkg' \
            --source "$NUGET_URL" --api-key "$NUGET_KEY" --skip-duplicate

  # ──────────────────────────────────────────────────────────────────────────
  # SLSA L3 provenance
  # ──────────────────────────────────────────────────────────────────────────
  # Reusable workflow oficial do projeto SLSA. Roda em runner *separado* do
  # build, isolando o passo de assinatura (requisito L3 de "build isolation
  # between provenance generation and the build itself").
  #
  # Gera arquivo `<artifact>.intoto.jsonl` contendo:
  #   • predicate `slsa-provenance` v1 (https://slsa.dev/provenance/v1)
  #     com: builder.id (deste workflow), buildType (generic), invocation
  #     (ref/commit/parameters), materials (source repo + commit SHA),
  #     metadata (timestamps reproduzíveis pelo runner)
  #   • assinatura keyless via Sigstore Fulcio (cert efêmero ligado ao
  #     OIDC token do GitHub Actions — claim subject contém workflow path,
  #     ref, repository, actor)
  #   • inclusion proof em Rekor (transparency log público)
  #
  # Por que isso fecha §5.3 (Comprometimento do CI):
  #   • Atacante que controle um runner não consegue forjar OIDC token do
  #     GitHub IdP — teria que comprometer o próprio GitHub.
  #   • Alterações no workflow path ou no branch viram diff visível no
  #     Rekor — `slsa-verifier` rejeita se o repositório/ref não bater.
  #   • Provenance vincula bit-exato o artefato baixado ao commit que o
  #     produziu (consumer verifica antes de carregar o .so).
  provenance:
    needs: [mode-gate, package]
    permissions:
      id-token: write   # OIDC para Sigstore (sem secrets persistentes).
      contents: write   # Anexa o .intoto.jsonl ao GitHub Release.
      actions: read     # Leitura de metadata do workflow para o predicate.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.package.outputs.artifacts-base64-subjects }}
      provenance-name: mcpix-sdk.intoto.jsonl
      # Em dry-run não há GitHub Release para anexar — só geramos a
      # attestation, sem upload. O Rekor inclusion proof continua sendo
      # emitido (transparência pública), o que é desejável até em dry-run.
      upload-assets: ${{ needs.mode-gate.outputs.create_github_release == 'true' }}
