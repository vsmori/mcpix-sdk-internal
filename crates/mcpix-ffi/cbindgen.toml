# cbindgen — gera o header C consumido por .NET (P/Invoke) e por integradores
# nativos diretos (C, Objective-C). NÃO consumido pela camada UniFFI — essa
# tem sua própria toolchain (ver crate `mcpix-uniffi`).

language = "C"
include_guard = "MCPIX_H"
autogen_warning = "/* Generated by cbindgen — DO NOT EDIT. Run `cargo xtask gen-bindings` to refresh. */"
cpp_compat = true
documentation = true
documentation_style = "doxy"
style = "type"
sort_by = "Name"
no_includes = false
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
includes = []
line_length = 100
tab_width = 4

[export]
prefix = ""
# Apenas funções e tipos com `#[no_mangle]` ou `#[repr(C)]` cruzam — o
# default do cbindgen já honra isso.

[export.rename]
"McpixReceiver" = "McpixReceiver"
"McpixStatus" = "McpixStatus"
"McpixValidation" = "McpixValidation"

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"
